global:
  scrape_interval: 15s   # fréquence de collecte
  evaluation_interval: 15s

scrape_configs:
  # ───────────────────────────────
  # Monitoring du bot Quantum Hedge
  # ───────────────────────────────
  - job_name: 'quantum-hedge-bot'
    static_configs:
      - targets: ['quantum-hedge-bot:8080']

  # ───────────────────────────────
  # Monitoring de Prometheus lui-même
  # ───────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
