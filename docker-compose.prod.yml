version: "3.9"

services:
  quantum-hedge-bot:
    build: .
    container_name: quantum-hedge-bot
    restart: always
    ports:
      - "8080:8080"
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - FLASK_SECRET=${FLASK_SECRET}
      - CAPITAL=1000
      - RISK_PCT=0.02
      - MAX_DRAWDOWN=0.10
      - MAX_PER_PAIR_RISK=0.05
      - HEDGE_MODE=auto
      - TESTNET_SPOT=true
      - TESTNET_FUTURES=true
    volumes:
      - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dashboard:
    image: nginx:alpine
    container_name: quantum-dashboard
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./dashboard.html:/usr/share/nginx/html/index.html
      - ./dashboard.js:/usr/share/nginx/html/dashboard.js

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
